[loggers]
keys=root,app,werkzeug,httpcore,httpx,wslog,wslog_chebi,builder

[handlers]
keys=trfHandler,chebiHandler,builderHandler,consoleHandler

[formatters]
keys=extFormatter


# -------------------
# ROOT LOGGER
# -------------------
[logger_root]
level=INFO
handlers=trfHandler,chebiHandler,consoleHandler


# -------------------
# APP LOGGER
# -------------------
[logger_app]
level=INFO
handlers=
qualname=app
propagate=1


# -------------------
# HTTP CLIENT LOGGERS
# -------------------
[logger_httpcore]
level=WARNING
handlers=
qualname=httpcore
propagate=1


[logger_httpx]
level=WARNING
handlers=
qualname=httpx
propagate=1


# -------------------
# WERKZEUG
# -------------------
[logger_werkzeug]
level=WARNING
handlers=
qualname=werkzeug
propagate=1


# -------------------
# CUSTOM LOGGERS
# -------------------
[logger_wslog]
level=INFO
handlers=trfHandler,consoleHandler
qualname=wslog
propagate=0


[logger_wslog_chebi]
level=INFO
handlers=chebiHandler,consoleHandler
qualname=wslog_chebi
propagate=0


[logger_builder]
level=DEBUG
handlers=builderHandler,consoleHandler
qualname=builder
propagate=0


# -------------------
# HANDLERS
# -------------------
[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=extFormatter
args=(sys.stdout,)


[handler_trfHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=extFormatter
args=('logs/ws_{{ hostname }}.log', 'midnight')


[handler_chebiHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=extFormatter
args=('logs/ws_chebi_pipeline_{{ hostname }}.log', 'midnight')


[handler_builderHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=extFormatter
args=('logs/ws_builders_{{ hostname }}.log', 'midnight')


# -------------------
# FORMATTER
# -------------------
[formatter_extFormatter]
class=logging.Formatter
format=%(asctime)s - %(name)s-%(module)s - %(levelname)s - %(message)s
datefmt=